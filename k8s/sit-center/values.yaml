# Default values for sit-center Helm chart

replicaCount:
  api: 2
  celeryWorker: 2
  mlWorker: 1
  celeryBeat: 1

image:
  repository: situational-center/api
  tag: "1.0.0"  # pinned (was latest) — override per release for reproducible rollouts
  pullPolicy: IfNotPresent

# -- Pod / container security hardening (applied to all workloads)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000        # matches the non-root "appuser" created in api/Dockerfile.api
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  # Root FS is read-only; the few writable paths (/tmp, /app/logs, MPLCONFIGDIR→
  # /tmp/matplotlib) are backed by emptyDir volumes injected into every workload
  # (see sit-center.writableVolume* helpers). Celery beat uses the Redis-backed
  # RedBeat scheduler, so it writes no celerybeat-schedule file either.
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- NetworkPolicy: default-deny ingress, allow only intra-app + ingress-controller + Prometheus
networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx   # namespace of the ingress controller (reaches API :8000)
  monitoringNamespace: monitoring   # namespace of Prometheus (scrapes API :8000)
  # Egress is open by default (pods need DNS + DB/Redis/Kafka/Vault/OTEL, whose
  # locations vary per deploy). Opt in to a default-deny egress that allows only DNS,
  # intra-release traffic, and the data-store ports below — set the ports to match
  # your infra before enabling, or a wrong policy will silently break connectivity.
  restrictEgress: false
  egressPorts: [5432, 6379, 9092, 8200, 4317, 443]

# -- PodDisruptionBudget: keep ≥1 api/worker pod up during voluntary disruptions
# (node drains/upgrades). Only for multi-replica workloads; beat is singleton.
podDisruptionBudget:
  enabled: true

# -- Spread API replicas across nodes (soft anti-affinity) so one node loss / drain
# doesn't take the whole API down.
apiAntiAffinity: true

# -- External secrets (create manually or via ExternalSecrets operator)
existingSecret: sit-center-secrets
# Keys expected in secret:
#   POSTGRES_PASSWORD, REDIS_PASSWORD, SECRET_KEY,
#   ADMIN_PASSWORD, WEBHOOK_API_KEY, I_DOIT_API_KEY

postgresql:
  host: sit-center-postgresql
  port: 5432
  user: sit_center
  database: sit_center

redis:
  host: sit-center-redis
  port: 6379

# -- Optional components
kafka:
  enabled: false
  bootstrapServers: sit-center-kafka:9092

clickhouse:
  enabled: false
  host: sit-center-clickhouse
  port: 8123

ldap:
  enabled: false
  url: "ldap://ldap:389"
  baseDn: ""

oidc:
  enabled: false
  issuerUrl: ""
  clientId: ""
  baseUrl: "https://sit-center.example.com"

# -- Resource limits
resources:
  api:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  celeryWorker:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  mlWorker:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

# -- Autoscaling
autoscaling:
  api:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

# -- Ingress
ingress:
  enabled: true
  className: nginx
  host: sit-center.example.com
  tls: true
  secretName: sit-center-tls

# -- Service
service:
  type: ClusterIP
  port: 8000

# -- Monitoring
prometheus:
  scrape: true
  port: 8000
  path: /metric

# -- Vault integration (optional)
vault:
  enabled: false
  address: "https://vault.example.com"
  role: sit-center
  secretPath: secret/data/sit-center

# -- Dedicated ServiceAccount (token mounted because vault.py needs it for k8s auth)
serviceAccount:
  automountToken: true

# -- Scheduled DB backup CronJob (off by default; point pvcName at durable storage)
backup:
  enabled: false
  schedule: "0 2 * * *"   # daily 02:00
  retain: 7               # keep the last N dumps
  image: postgres:15
  pvcName: ""             # defaults to <release>-backups
