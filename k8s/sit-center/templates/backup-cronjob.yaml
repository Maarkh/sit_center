{{- if .Values.backup.enabled }}
# Scheduled logical backup of the TimescaleDB database. disaster-recovery.md documented
# pg_dump/pg_basebackup but nothing ran them — this CronJob automates the daily dump to a
# PersistentVolume (point it at object storage in production for off-cluster durability).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-db-backup
  labels:
    {{- include "sit-center.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: {{ .Release.Name }}-sa
          restartPolicy: OnFailure
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: pg-dump
              image: {{ .Values.backup.image | default "postgres:15" | quote }}
              command:
                - sh
                - -c
                - >
                  set -e;
                  TS=$(date +%Y%m%d-%H%M%S);
                  pg_dump "$DATABASE_URL" --format=custom
                  --file="/backups/{{ .Release.Name }}-$TS.dump";
                  ls -t /backups/*.dump | tail -n +{{ add .Values.backup.retain 1 }} | xargs -r rm -f;
                  echo "backup $TS done"
              env:
                {{- include "sit-center.env" . | nindent 16 }}
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ .Values.backup.pvcName | default (printf "%s-backups" .Release.Name) }}
{{- end }}
