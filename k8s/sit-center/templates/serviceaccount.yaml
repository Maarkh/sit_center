# Dedicated, minimally-privileged ServiceAccount for all workloads (api/celery/ml/beat).
# Pods previously ran on the namespace 'default' SA, which any pod could assume — and
# vault.py authenticates to Vault with this SA's token (VAULT_ROLE), so the token is the
# app's identity. A dedicated SA scopes that identity to this release.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-sa
  labels:
    {{- include "sit-center.labels" . | nindent 4 }}
# The token is mounted because vault.py needs it for k8s auth; flip to false for any
# workload that does not talk to Vault.
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken | default true }}
