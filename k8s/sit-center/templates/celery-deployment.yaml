apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-celery-worker
  labels:
    {{- include "sit-center.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-worker
spec:
  replicas: {{ .Values.replicaCount.celeryWorker }}
  selector:
    matchLabels:
      {{- include "sit-center.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-worker
  template:
    metadata:
      labels:
        {{- include "sit-center.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery-worker
    spec:
      serviceAccountName: {{ .Release.Name }}-sa
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            - celery
            - -A
            - tasks.celery_app
            - worker
            - --loglevel=INFO
            - --concurrency=2
            - --max-tasks-per-child=100
          env:
            {{- include "sit-center.env" . | nindent 12 }}
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ .Values.redis.host }}:{{ .Values.redis.port }}/0"
          # The worker responds to `inspect ping` only when it's connected to the broker
          # and processing — a hung worker fails this and gets restarted.
          readinessProbe:
            exec:
              command: ["celery", "-A", "tasks.celery_app", "inspect", "ping", "-t", "10"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 12
          livenessProbe:
            exec:
              command: ["celery", "-A", "tasks.celery_app", "inspect", "ping", "-t", "10"]
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 12
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.celeryWorker | nindent 12 }}
          volumeMounts:
            {{- include "sit-center.writableVolumeMounts" . | nindent 12 }}
      volumes:
        {{- include "sit-center.writableVolumes" . | nindent 8 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-celery-beat
  labels:
    {{- include "sit-center.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-beat
spec:
  replicas: {{ .Values.replicaCount.celeryBeat }}
  selector:
    matchLabels:
      {{- include "sit-center.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-beat
  template:
    metadata:
      labels:
        {{- include "sit-center.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery-beat
    spec:
      serviceAccountName: {{ .Release.Name }}-sa
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: beat
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            - celery
            - -A
            - tasks.celery_app
            - beat
            - --loglevel=INFO
            # Redis-backed schedule (RedBeat): no local celerybeat-schedule file, so
            # beat runs under a read-only root FS and its state survives pod restarts
            # (HA). redbeat_redis_url defaults to broker_url, which is our Redis.
            - --scheduler=redbeat.RedBeatScheduler
          env:
            {{- include "sit-center.env" . | nindent 12 }}
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ .Values.redis.host }}:{{ .Values.redis.port }}/0"
          # Beat liveness uses the Redis heartbeat written by the beat-heartbeat task
          # (core/dss_tasks): if beat hangs, the key expires and the pod is restarted.
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import os,redis,sys; sys.exit(0 if redis.from_url(os.environ['REDIS_URL']).get('beat:heartbeat') else 1)"
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            {{- include "sit-center.writableVolumeMounts" . | nindent 12 }}
      volumes:
        {{- include "sit-center.writableVolumes" . | nindent 8 }}
