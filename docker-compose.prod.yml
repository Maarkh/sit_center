services:
  # ——— PostgreSQL для Situational Center ———
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d  # ← Только для основной БД
    ports:
      - "5433:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ——— Redis ———
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ——— Airbyte: PostgreSQL (только для Airbyte) ———
  airbyte-db:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: airbyte
    volumes:
      - airbyte_db_data:/var/lib/postgresql/data
      # ❌ УДАЛЕНО: ./db/migrations — Airbyte сам управляет своей схемой
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ——— Airbyte: Temporal ———
  airbyte-temporal:
    image: airbyte/temporal:${AIRBYTE_VERSION:-0.50.4}
    environment:
      - DB=postgresql
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=airbyte-db
      - POSTGRES_DB=airbyte
    depends_on:
      airbyte-db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # ——— Airbyte: Server ———
  airbyte-server:
    image: airbyte/server:${AIRBYTE_VERSION:-0.50.4}
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airbyte-db:5432/airbyte
      - CONFIG_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airbyte-db:5432/airbyte
      - TEMPORAL_HOST=airbyte-temporal
      - WORKSPACE_ROOT=/tmp/workspace
      - LOCAL_ROOT=/tmp/workspace
      - LOG_LEVEL=INFO
    depends_on:
      airbyte-db:
        condition: service_healthy
      airbyte-temporal:
        condition: service_started
    volumes:
      - airbyte_workspace:/tmp/workspace
    networks:
      - app-network
    restart: unless-stopped

  # ——— Airbyte: Worker ———
  airbyte-worker:
    image: airbyte/worker:${AIRBYTE_VERSION:-0.50.4}
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airbyte-db:5432/airbyte
      - TEMPORAL_HOST=airbyte-temporal
      - WORKSPACE_ROOT=/tmp/workspace
      - LOCAL_ROOT=/tmp/workspace
      - WORKER_ENVIRONMENT=docker
    depends_on:
      airbyte-db:
        condition: service_healthy
      airbyte-temporal:
        condition: service_started
    volumes:
      - airbyte_workspace:/tmp/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    restart: unless-stopped

  # ——— Airbyte: Web UI ———
  airbyte-webapp:
    image: airbyte/webapp:${AIRBYTE_VERSION:-0.50.4}
    ports:
      - "8001:80"
    environment:
      - API_URL=http://airbyte-server:8001
    depends_on:
      - airbyte-server
    networks:
      - app-network
    restart: unless-stopped

  # ——— FastAPI ———
  api:
    build:
      context: .
      dockerfile: api/Dockerfile.api
    image: situational-center/api:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_CHAT_ID_CRITICAL=${TELEGRAM_CHAT_ID_CRITICAL}
      - TELEGRAM_CHAT_ID_WARNING=${TELEGRAM_CHAT_ID_WARNING}
      - I_DOIT_API_URL=${I_DOIT_API_URL}
      - I_DOIT_API_KEY=${I_DOIT_API_KEY}
      - WEBHOOK_API_KEY=${WEBHOOK_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ——— Grafana ———
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # ——— Celery Worker ———
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    command: >
      celery -A tasks.celery_app worker
      --loglevel=INFO
      --concurrency=2
      --max-tasks-per-child=100
      --pool=prefork
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "celery", "call", "tasks.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ——— ML Worker (dedicated queue) ———
  ml-worker:
    build:
      context: .
      dockerfile: Dockerfile.ml-worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  # ——— Celery Beat ———
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    command: ["celery", "-A", "tasks.celery_app", "beat", "-l", "INFO", "--scheduler", "celery.beat:PersistentScheduler"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "celery", "call", "tasks.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ——— Flower (Celery monitor) ———
  flower:
    image: mher/flower
    command: ["celery", "--broker=redis://:${REDIS_PASSWORD}@redis:6379/0", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ——— ClickHouse (OLAP analytics) ———
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./db/clickhouse/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql
    environment:
      CLICKHOUSE_DB: sit_center
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ——— Zookeeper (for Kafka) ———
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ——— Kafka ———
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ——— Kafka Consumer ———
  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile.kafka-consumer
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # ——— GLPI (ITSM) ———
  glpi-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${GLPI_DB_NAME}
      MYSQL_USER: ${GLPI_DB_USER}
      MYSQL_PASSWORD: ${GLPI_DB_PASS}
    volumes:
      - glpi_mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10

  glpi:
    image: glpi/glpi:latest
    environment:
      - GLPI_DB_HOST=glpi-db
      - GLPI_DB_NAME=${GLPI_DB_NAME}
      - GLPI_DB_USER=${GLPI_DB_USER}
      - GLPI_DB_PASSWORD=${GLPI_DB_PASS}
      - GLPI_LANGUAGE=ru_RU
    ports:
      - "8080:80"
    depends_on:
      glpi-db:
        condition: service_healthy
    volumes:
      - glpi_data:/var/www/html
      - glpi_plugins:/var/www/html/plugins
      - glpi_marketplace:/var/www/html/marketplace
    networks:
      - app-network
    restart: unless-stopped

  # ——— Keycloak DB ———
  keycloak-db:
    image: postgres:15
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ——— Keycloak (OIDC SSO) ———
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8443:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  airbyte_db_data:
  airbyte_workspace:
  glpi_mysql_data:
  glpi_data:
  glpi_plugins:
  glpi_marketplace:
  keycloak_db_data:
  clickhouse_data:
  zookeeper_data:
  kafka_data: