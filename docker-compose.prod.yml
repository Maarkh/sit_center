version: '3.8'

services:
  # ——— PostgreSQL ———
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ——— Redis ———
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ——— Airbyte ———
  airbyte-db:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: airbyte
    volumes:
      - airbyte_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airbyte-temporal:
    image: airbyte/temporal:${AIRBYTE_VERSION:-0.50.4}
    environment:
      - DB=postgresql
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=airbyte-db
      - POSTGRES_DB=airbyte
    depends_on:
      airbyte-db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  airbyte-server:
    image: airbyte/server:${AIRBYTE_VERSION:-0.50.4}
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airbyte-db:5432/airbyte
      - CONFIG_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airbyte-db:5432/airbyte
      - TEMPORAL_HOST=airbyte-temporal
      - WORKSPACE_ROOT=/tmp/workspace
      - LOCAL_ROOT=/tmp/workspace
      - LOG_LEVEL=INFO
    depends_on:
      airbyte-db:
        condition: service_healthy
      airbyte-temporal:
        condition: service_started
    volumes:
      - airbyte_workspace:/tmp/workspace
    networks:
      - app-network
    restart: unless-stopped

  airbyte-worker:
    image: airbyte/worker:${AIRBYTE_VERSION:-0.50.4}
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airbyte-db:5432/airbyte
      - TEMPORAL_HOST=airbyte-temporal
      - WORKSPACE_ROOT=/tmp/workspace
      - LOCAL_ROOT=/tmp/workspace
      - WORKER_ENVIRONMENT=docker
    depends_on:
      airbyte-db:
        condition: service_healthy
      airbyte-temporal:
        condition: service_started
    volumes:
      - airbyte_workspace:/tmp/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    restart: unless-stopped

  airbyte-webapp:
    image: airbyte/webapp:${AIRBYTE_VERSION:-0.50.4}
    ports:
      - "8001:80"
    environment:
      - API_URL=http://airbyte-server:8001
    depends_on:
      - airbyte-server
    networks:
      - app-network
    restart: unless-stopped

  # ——— FastAPI (единый API + Webhooks) ———
  api:
    build:
      context: .
      dockerfile: api/Dockerfile.api
    image: situational-center/api:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_CHAT_ID_CRITICAL=${TELEGRAM_CHAT_ID_CRITICAL}
      - TELEGRAM_CHAT_ID_WARNING=${TELEGRAM_CHAT_ID_WARNING}
      - I_DOIT_API_URL=${I_DOIT_API_URL}
      - I_DOIT_API_KEY=${I_DOIT_API_KEY}
      - WEBHOOK_API_KEY=${WEBHOOK_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ——— Grafana ———
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # ——— Celery (worker + beat) ———
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    command: >
      celery -A tasks.celery_app worker
      --loglevel=INFO
      --concurrency=2
      --max-tasks-per-child=100
      --pool=prefork
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "celery", "call", "tasks.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    command: ["celery", "-A", "tasks.celery_app", "beat", "-l", "INFO", "--scheduler", "celery.beat:PersistentScheduler"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "celery", "call", "tasks.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ——— Flower ———
  flower:
    image: mher/flower
    command: ["celery", "--broker=redis://:${REDIS_PASSWORD}@redis:6379/0", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - app-network

  # ——— GLPI (IT Service Management) ———
  glpi-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${GLPI_DB_NAME}
      MYSQL_USER: ${GLPI_DB_USER}
      MYSQL_PASSWORD: ${GLPI_DB_PASS}
    volumes:
      - glpi_mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10

  glpi:
    image: glpi/glpi:latest
    environment:
      - GLPI_DB_HOST=glpi-db
      - GLPI_DB_NAME=${GLPI_DB_NAME}
      - GLPI_DB_USER=${GLPI_DB_USER}
      - GLPI_DB_PASSWORD=${GLPI_DB_PASS}
      - GLPI_LANGUAGE=ru_RU
    ports:
      - "8080:80"
    depends_on:
      glpi-db:
        condition: service_healthy
    volumes:
      - glpi_data:/var/www/html
      - glpi_plugins:/var/www/html/plugins
      - glpi_marketplace:/var/www/html/marketplace
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  airbyte_db_data:
  airbyte_workspace:
  glpi_mysql_data:
  glpi_data:
  glpi_plugins:
  glpi_marketplace: