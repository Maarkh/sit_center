services:
  # ——— PostgreSQL для Situational Center ———
  db:
    image: timescale/timescaledb:2.18.0-pg15  # pinned (was latest-pg15) for reproducible deploys
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d  # ← Только для основной БД
    ports:
      # Привязка к localhost: БД не должна быть доступна с внешнего интерфейса.
      - "127.0.0.1:5433:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ——— Redis ———
  # Redis master. For HA, the replicas + sentinels below monitor it as "mymaster";
  # set REDIS_SENTINELS in .env to make the app/celery discover the master via Sentinel.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--masterauth", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ——— Redis HA: replicas + sentinels (used when REDIS_SENTINELS is set) ———
  redis-replica-1:
    image: redis:7-alpine
    command: ["redis-server", "--replicaof", "redis", "6379", "--requirepass", "${REDIS_PASSWORD}", "--masterauth", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  redis-replica-2:
    image: redis:7-alpine
    command: ["redis-server", "--replicaof", "redis", "6379", "--requirepass", "${REDIS_PASSWORD}", "--masterauth", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # 3 sentinels for quorum (monitor "mymaster" = the redis service, quorum 2).
  # The conf is written at start (sentinel rewrites it at runtime, so it must be
  # on a writable path); %s is the password from the container env ($$ defers
  # interpolation to the container shell).
  redis-sentinel-1: &sentinel
    image: redis:7-alpine
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command:
      - sh
      - -c
      - >-
        printf 'port 26379\nsentinel resolve-hostnames yes\nsentinel monitor mymaster redis 6379 2\nsentinel auth-pass mymaster %s\nsentinel down-after-milliseconds mymaster 5000\nsentinel failover-timeout mymaster 10000\nsentinel parallel-syncs mymaster 1\n' "$$REDIS_PASSWORD" > /tmp/sentinel.conf && exec redis-sentinel /tmp/sentinel.conf
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  redis-sentinel-2:
    <<: *sentinel
  redis-sentinel-3:
    <<: *sentinel

  # ——— Airbyte (ELT) ———
  # ⚠️ Весь стек Airbyte вынесен в compose-профиль "airbyte" и НЕ стартует по
  # умолчанию. Причина: airbyte-worker монтирует host docker.sock (по сути root
  # на хосте). Запускать только осознанно на доверенном хосте:
  #     docker compose --profile airbyte up -d
  # Для продакшена предпочтительнее разворачивать Airbyte отдельно (Kubernetes).
  airbyte-db:
    image: postgres:13
    profiles: ["airbyte"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: airbyte
    volumes:
      - airbyte_db_data:/var/lib/postgresql/data
      # ❌ УДАЛЕНО: ./db/migrations — Airbyte сам управляет своей схемой
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ——— Airbyte: Temporal ———
  airbyte-temporal:
    image: airbyte/temporal:${AIRBYTE_VERSION:-0.50.4}
    profiles: ["airbyte"]
    environment:
      - DB=postgresql
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=airbyte-db
      - POSTGRES_DB=airbyte
    depends_on:
      airbyte-db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # ——— Airbyte: Server ———
  airbyte-server:
    image: airbyte/server:${AIRBYTE_VERSION:-0.50.4}
    profiles: ["airbyte"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airbyte-db:5432/airbyte
      - CONFIG_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airbyte-db:5432/airbyte
      - TEMPORAL_HOST=airbyte-temporal
      - WORKSPACE_ROOT=/tmp/workspace
      - LOCAL_ROOT=/tmp/workspace
      - LOG_LEVEL=INFO
    depends_on:
      airbyte-db:
        condition: service_healthy
      airbyte-temporal:
        condition: service_started
    volumes:
      - airbyte_workspace:/tmp/workspace
    networks:
      - app-network
    restart: unless-stopped

  # ——— Airbyte: Worker ———
  airbyte-worker:
    image: airbyte/worker:${AIRBYTE_VERSION:-0.50.4}
    profiles: ["airbyte"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@airbyte-db:5432/airbyte
      - TEMPORAL_HOST=airbyte-temporal
      - WORKSPACE_ROOT=/tmp/workspace
      - LOCAL_ROOT=/tmp/workspace
      - WORKER_ENVIRONMENT=docker
    depends_on:
      airbyte-db:
        condition: service_healthy
      airbyte-temporal:
        condition: service_started
    volumes:
      - airbyte_workspace:/tmp/workspace
      # ⚠️ Доступ к host docker.sock = фактически root на хосте. Требуется только
      # для docker-режима Airbyte (worker запускает контейнеры коннекторов).
      # Поэтому весь стек Airbyte спрятан за профилем "airbyte" (см. выше).
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    restart: unless-stopped

  # ——— Airbyte: Web UI ———
  airbyte-webapp:
    image: airbyte/webapp:${AIRBYTE_VERSION:-0.50.4}
    profiles: ["airbyte"]
    ports:
      # Только localhost: админ-UI Airbyte не публикуем наружу.
      - "127.0.0.1:8001:80"
    environment:
      - API_URL=http://airbyte-server:8001
    depends_on:
      - airbyte-server
    networks:
      - app-network
    restart: unless-stopped

  # ——— FastAPI ———
  api:
    build:
      context: .
      dockerfile: api/Dockerfile.api
    image: situational-center/api:1.0.0  # pinned tag for the locally-built API image
    ports:
      # localhost only — public traffic enters via the nginx TLS proxy (443).
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_CHAT_ID_CRITICAL=${TELEGRAM_CHAT_ID_CRITICAL}
      - TELEGRAM_CHAT_ID_WARNING=${TELEGRAM_CHAT_ID_WARNING}
      - I_DOIT_API_URL=${I_DOIT_API_URL}
      - I_DOIT_API_KEY=${I_DOIT_API_KEY}
      - WEBHOOK_API_KEY=${WEBHOOK_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ——— TLS reverse proxy (public entrypoint) ———
  # Terminates TLS and proxies to the API. Put your certs in ./certs as
  # fullchain.pem + privkey.pem (e.g. from certbot/Let's Encrypt). The API itself
  # is bound to 127.0.0.1, so 443 here is the only public surface.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped

  # ——— Prometheus (scrapes API /metric; Grafana datasource points here) ———
  prometheus:
    image: prom/prometheus:v2.54.1  # pinned for reproducible deploys
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      # Только localhost: Prometheus наружу не публикуем.
      - "127.0.0.1:9090:9090"
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ——— Grafana ———
  grafana:
    image: grafana/grafana:11.3.0  # pinned (was latest) for reproducible deploys
    ports:
      # Только localhost: доступ к Grafana — через reverse-proxy/VPN.
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      # Provisioning dashboards.yml loads from here — mount the dashboard JSON in.
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      db:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ——— Celery Worker ———
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    command: >
      celery -A tasks.celery_app worker
      --loglevel=INFO
      --concurrency=2
      --max-tasks-per-child=100
      --pool=prefork
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "celery", "call", "tasks.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ——— ML Worker (dedicated queue) ———
  ml-worker:
    build:
      context: .
      dockerfile: Dockerfile.ml-worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ——— Celery Beat ———
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    # Redis-backed schedule (RedBeat): no celerybeat-schedule file, state survives
    # restarts. redbeat_redis_url defaults to broker_url (our Redis).
    command: ["celery", "-A", "tasks.celery_app", "beat", "-l", "INFO", "--scheduler", "redbeat.RedBeatScheduler"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "celery", "call", "tasks.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ——— Metric collector (M1: host_agent + http_pull ingestion) ———
  # Reads ENABLED data_sources from the registry and writes canonical_metrics for
  # every active tenant (set COLLECTOR_TENANT to pin a single tenant). Reuses the
  # celery image (already installs psutil/requests, runs as uid 1000).
  # NOTE: psutil inside a container reports THIS CONTAINER's cpu/mem, not the host's.
  # For true host metrics run the collector on the host, or add `pid: "host"` and
  # mount /proc here. http_pull / http_push sources are unaffected.
  metric-collector:
    build:
      context: .
      dockerfile: Dockerfile.celery
    command: ["python", "scripts/monitor_cpu.py"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SAMPLE_SECONDS=5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import psutil; psutil.cpu_percent()"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ——— Flower (Celery monitor) ———
  flower:
    image: mher/flower
    command: ["celery", "--broker=redis://:${REDIS_PASSWORD}@redis:6379/0", "flower", "--port=5555"]
    ports:
      # Только localhost: Flower раскрывает данные о задачах — не публикуем.
      - "127.0.0.1:5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ——— ClickHouse (OLAP analytics) ———
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    ports:
      # Только localhost: HTTP/native-порты ClickHouse не публикуем наружу.
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./db/clickhouse/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql
    environment:
      CLICKHOUSE_DB: sit_center
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ——— Zookeeper (for Kafka) ———
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ——— Kafka ———
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ——— Kafka Consumer ———
  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile.kafka-consumer
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import kafka; print(\"ok\")' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ——— i-doit (ITSM / CMDB) ———
  idoit-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${IDOIT_DB_ROOT_PASSWORD:?set IDOIT_DB_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${IDOIT_DB_NAME:-idoit}
      MYSQL_USER: ${IDOIT_DB_USER:-idoit}
      MYSQL_PASSWORD: ${IDOIT_DB_PASS:?set IDOIT_DB_PASS in .env}
    volumes:
      - idoit_mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  idoit:
    image: bheisig/idoit:1.19
    environment:
      IDOIT_DB_HOST: idoit-db
      IDOIT_DB_NAME: ${IDOIT_DB_NAME:-idoit}
      IDOIT_DB_USERNAME: ${IDOIT_DB_USER:-idoit}
      IDOIT_DB_PASSWORD: ${IDOIT_DB_PASS:?set IDOIT_DB_PASS in .env}
      IDOIT_DB_ROOT_PASSWORD: ${IDOIT_DB_ROOT_PASSWORD:?set IDOIT_DB_ROOT_PASSWORD in .env}
      IDOIT_ADMIN_PASSWORD: ${IDOIT_ADMIN_PASS:?set IDOIT_ADMIN_PASS in .env}
      IDOIT_DEFAULT_TENANT: sit-center
    ports:
      # Только localhost: панель i-doit — через reverse-proxy/VPN.
      - "127.0.0.1:9080:80"
    depends_on:
      idoit-db:
        condition: service_healthy
    volumes:
      - idoit_data:/var/www/html
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ——— Keycloak DB ———
  keycloak-db:
    image: postgres:15
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set KEYCLOAK_DB_PASSWORD in .env}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ——— Keycloak (OIDC SSO) ———
  # ⚠️ PROD: `start-dev` отключает TLS и оптимизации и НЕ предназначен для
  # продакшена. Перед боевым запуском замените на `start` с настроенными
  # KC_HOSTNAME, KC_PROXY=edge и TLS на reverse-proxy (порт ниже слушает только
  # 127.0.0.1 и должен публиковаться исключительно через TLS-reverse-proxy).
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    # Production mode (NOT start-dev): TLS is terminated at the nginx reverse proxy,
    # so Keycloak runs http behind it with KC_PROXY=edge. Set KC_HOSTNAME to the
    # public domain in .env before going live.
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set KEYCLOAK_DB_PASSWORD in .env}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set KEYCLOAK_ADMIN_PASSWORD in .env}
      KC_HEALTH_ENABLED: "true"
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      # Только localhost: Keycloak публикуем только через TLS-reverse-proxy.
      - "127.0.0.1:8443:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:
  airbyte_db_data:
  airbyte_workspace:
  idoit_mysql_data:
  idoit_data:
  keycloak_db_data:
  clickhouse_data:
  zookeeper_data:
  kafka_data: