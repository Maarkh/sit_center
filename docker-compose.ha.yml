# docker-compose.ha.yml
# High-Availability override: run with
#   docker-compose -f docker-compose.prod.yml -f docker-compose.ha.yml up -d

services:
  # --- API instances behind nginx ---
  api-1:
    extends:
      file: docker-compose.prod.yml
      service: api
    ports: []   # nginx will proxy
    container_name: api-1

  api-2:
    extends:
      file: docker-compose.prod.yml
      service: api
    ports: []
    container_name: api-2

  # --- Nginx Load Balancer ---
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
    networks:
      - app-network
    restart: unless-stopped

  # --- Redis Sentinel (3 nodes) ---
  redis-sentinel-1:
    image: redis:7-alpine
    command: >
      sh -c "cat > /etc/redis/sentinel.conf << 'EOF'
      port 26379
      sentinel monitor mymaster redis 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1
      EOF
      redis-sentinel /etc/redis/sentinel.conf"
    networks:
      - app-network
    restart: unless-stopped

  redis-sentinel-2:
    image: redis:7-alpine
    command: >
      sh -c "cat > /etc/redis/sentinel.conf << 'EOF'
      port 26379
      sentinel monitor mymaster redis 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1
      EOF
      redis-sentinel /etc/redis/sentinel.conf"
    networks:
      - app-network
    restart: unless-stopped

  redis-sentinel-3:
    image: redis:7-alpine
    command: >
      sh -c "cat > /etc/redis/sentinel.conf << 'EOF'
      port 26379
      sentinel monitor mymaster redis 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1
      EOF
      redis-sentinel /etc/redis/sentinel.conf"
    networks:
      - app-network
    restart: unless-stopped

  # --- DB Replica (streaming replication) ---
  db-replica:
    image: timescale/timescaledb:2.18.0-pg15  # pinned (was latest-pg15) — must match db in prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >
      bash -c "
        until pg_isready -h db -U $${POSTGRES_USER}; do sleep 2; done;
        pg_basebackup -h db -U $${POSTGRES_USER} -D /var/lib/postgresql/data -Fp -Xs -P -R;
        postgres
      "
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_replica_data:

networks:
  app-network:
    driver: bridge
