name: Generate Project Documentation
# Не запускается на каждый push: раньше это регенерировало README и коммитило его
# на каждое изменение .py, раздувая git-историю. Теперь — вручную или раз в неделю.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"  # каждый понедельник в 03:00 UTC
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        # Генератору нужны только эти пакеты, а не весь requirements.txt (ML-стек).
        run: |
          python -m pip install --upgrade pip
          pip install pathspec python-docx
      - name: Generate documentation
        run: |
          python generate_docs.py
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "docs: auto-update project structure"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
