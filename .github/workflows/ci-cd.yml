name: CI/CD Pipeline
on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install lint tools
        run: |
          pip install --upgrade pip
          pip install ruff
      - name: Run linter (Ruff)
        run: ruff check . --ignore E501

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TESTING: "1"
      SECRET_KEY: test-secret-key-for-ci
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: test_db
      DATABASE_URL: postgresql://postgres:testpass@localhost:5432/test_db
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: "$2b$12$LJ3m4ys5qOzXkVzKlGT..ea.J7GIIO0C.jPBsCijMOZqMPfTpF8a6"
      I_DOIT_API_KEY: test-key
      I_DOIT_API_URL: http://localhost/api
      WEBHOOK_API_KEY: test-webhook-key
      KAFKA_ENABLED: "false"
      CLICKHOUSE_ENABLED: "false"
      LDAP_ENABLED: "false"
      OIDC_ENABLED: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short -x --ignore=tests/test_ml.py
      - name: Upload coverage
        if: always()
        run: |
          python -m pytest tests/ --ignore=tests/test_ml.py --cov=api --cov=core --cov-report=term-missing || true

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build and push image
        run: |
          docker build -t Maarkh/sit_center:latest -f Dockerfile .
          docker push Maarkh/sit_center:latest
