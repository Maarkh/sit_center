name: CI/CD Pipeline
on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize]

# Least privilege: workflow only needs to read the repo. Anything that needs
# more (e.g. pushing images) authenticates with its own dedicated secret.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install lint tools
        run: |
          pip install --upgrade pip
          pip install ruff
      - name: Run linter (Ruff)
        run: ruff check . --ignore E501

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install scanners
        run: |
          pip install --upgrade pip
          pip install pip-audit bandit
      # Blocking. Audits runtime deps only (requirements.txt). Test tooling lives
      # in requirements-dev.txt (pytest >= 9.0.3).
      # Ignored, with justification:
      #   GHSA-rrmf-rvhw-rf47 (CVE-2025-3000) — memory corruption in
      #   torch.jit.script. No fixed release exists (2.12.0 is the latest on PyPI
      #   and is still `last_affected`), and we never call torch.jit.script /
      #   jit.load / torch.load on untrusted input — the vulnerable surface is
      #   unused. Re-audit when a patched torch ships and drop this ignore.
      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt --ignore-vuln GHSA-rrmf-rvhw-rf47
      - name: Static security analysis (bandit)
        run: bandit -r api core --severity-level medium --confidence-level medium -q

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TESTING: "1"
      SECRET_KEY: test-secret-key-for-ci
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: test_db
      DATABASE_URL: postgresql://postgres:testpass@localhost:5432/test_db
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: "$2b$12$LJ3m4ys5qOzXkVzKlGT..ea.J7GIIO0C.jPBsCijMOZqMPfTpF8a6"
      I_DOIT_API_KEY: test-key
      I_DOIT_API_URL: http://localhost/api
      WEBHOOK_API_KEY: test-webhook-key
      KAFKA_ENABLED: "false"
      CLICKHOUSE_ENABLED: "false"
      LDAP_ENABLED: "false"
      OIDC_ENABLED: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        # Integration tests run in the dedicated `integration` job (real TimescaleDB
        # with migrations applied); this job uses plain postgres for unit tests.
        run: |
          python -m pytest tests/ -v --tb=short -x --ignore=tests/test_ml.py --ignore=tests/integration
      - name: Upload coverage
        if: always()
        run: |
          python -m pytest tests/ --ignore=tests/test_ml.py --ignore=tests/integration --cov=api --cov=core --cov-report=term-missing || true

  # Deploy-path guard: apply db/migrations to a REAL TimescaleDB (catches schema
  # regressions like the hypertable PK / continuous-aggregate policy), then run the
  # integration suite against it (auth, incident lifecycle, tenant isolation).
  integration:
    runs-on: ubuntu-latest
    needs: lint
    services:
      timescaledb:
        image: timescale/timescaledb:2.17.2-pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TESTING: "1"
      COOKIE_SECURE: "false"
      LOG_FORMAT: text
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: test_db
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      SECRET_KEY: integration-ci-secret-key-0123456789abcdef
      ADMIN_USERNAME: admin
      # bcrypt hash of "admin" so the admin_token fixture can log in (tests run, not skip)
      ADMIN_PASSWORD: "$2b$12$og87/j8zmULE7nd6EUpud.rS/8xpxmW5GaciRZBG.hkHQztviVeri"
      I_DOIT_API_KEY: test-key
      I_DOIT_API_URL: http://localhost/api
      WEBHOOK_API_KEY: test-webhook-key
      KAFKA_ENABLED: "false"
      CLICKHOUSE_ENABLED: "false"
      LDAP_ENABLED: "false"
      OIDC_ENABLED: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Apply migrations (deploy-path guard)
        run: |
          for f in $(ls db/migrations/*.sql | sort); do
            echo "::group::apply $(basename "$f")"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
            echo "::endgroup::"
          done
      - name: Verify schema (hypertable + continuous aggregate + tenant_id)
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -tAc \
            "SELECT 1 FROM timescaledb_information.hypertables WHERE hypertable_name='canonical_metrics';" | grep -q 1
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -tAc \
            "SELECT 1 FROM timescaledb_information.continuous_aggregates WHERE view_name='cagg_hourly_metrics';" | grep -q 1
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -tAc \
            "SELECT 1 FROM information_schema.columns WHERE table_name='canonical_metrics' AND column_name='tenant_id';" | grep -q 1
      - name: Verify DSS schema (M2 indicators + M3 deviations + M8 processes)
        run: |
          # Each DSS module's anchor table must exist, else migrations 010-017 regressed.
          for tbl in indicators deviations chronicles process_templates step_assignments playbooks recommendations predictive_alerts forecasts situations indicator_dependencies decision_outcomes scenarios; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -tAc \
              "SELECT 1 FROM information_schema.tables WHERE table_name='$tbl';" | grep -q 1
          done
          # The partial unique index that backs the deviation upsert must be present.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -tAc \
            "SELECT 1 FROM pg_indexes WHERE indexname='ux_deviations_active_fp';" | grep -q 1
      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Integration tests (against real migrated DB)
        run: |
          python -m pytest tests/integration/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: [test, integration]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    # `secrets` can't be used in step-level `if`, so surface presence via env.
    env:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Skip notice
        if: ${{ env.DOCKER_HUB_TOKEN == '' }}
        run: echo "DOCKER_HUB_TOKEN secret not set — skipping image build/push."
      - name: Login to Docker Hub
        if: ${{ env.DOCKER_HUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_TOKEN }}
      - name: Build and push image
        if: ${{ env.DOCKER_HUB_TOKEN != '' }}
        env:
          IMAGE: ${{ env.DOCKER_HUB_USERNAME }}/sit_center
        run: |
          # Build the API image (no root Dockerfile exists — it lives at api/Dockerfile.api)
          # and tag with both the commit SHA (immutable/traceable) and latest.
          docker build -t "$IMAGE:${GITHUB_SHA}" -t "$IMAGE:latest" -f api/Dockerfile.api .
          docker push "$IMAGE:${GITHUB_SHA}"
          docker push "$IMAGE:latest"
