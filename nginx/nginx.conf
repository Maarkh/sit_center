worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Не раскрываем версию nginx в заголовках/ошибках.
    server_tokens off;

    # Грубый rate-limit на уровне прокси (в дополнение к slowapi в приложении).
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=20r/s;

    upstream api_backend {
        least_conn;
        server api-1:8000;
        server api-2:8000;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # --- Security headers (применяются ко всем ответам) ---
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-XSS-Protection "1; mode=block" always;
        # За TLS-терминатором включите HSTS:
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # При необходимости ужесточите CSP под фронтенд:
        # add_header Content-Security-Policy "default-src 'self'; connect-src 'self'" always;

        # API and static requests
        location / {
            limit_req zone=api_rl burst=40 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # WebSocket support
        location /ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://api_backend;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }
    }
}
