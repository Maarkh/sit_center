worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Не раскрываем версию nginx в заголовках/ошибках.
    server_tokens off;

    # Грубый rate-limit на уровне прокси (в дополнение к slowapi в приложении).
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=20r/s;

    upstream api_backend {
        least_conn;
        server api-1:8000;
        server api-2:8000;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Plain HTTP → redirect to HTTPS (TLS is terminated here, same as the single-node
    # prod proxy — the HA overlay must NOT drop TLS).
    server {
        listen 80;
        server_name _;
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # --- Security headers (применяются ко всем ответам) ---
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 10m;

        # API and static requests
        location / {
            limit_req zone=api_rl burst=40 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # WebSocket support
        location /ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://api_backend;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }
    }
}
